# Example input.yaml for EWC with computed Fisher information
# First run compute_fisher preset to generate fisher_sevenn.pt and opt_params_sevenn.pt

model:
    chemical_species: 'auto'
    cutoff: 5.0
    channel: 128
    is_parity: False
    lmax: 2
    num_convolution_layer: 5
    irreps_manual:
        - "128x0e"
        - "128x0e+64x1e+32x2e"
        - "128x0e+64x1e+32x2e"
        - "128x0e+64x1e+32x2e"
        - "128x0e+64x1e+32x2e"
        - "128x0e"

    weight_nn_hidden_neurons: [64, 64]
    radial_basis:
        radial_basis_name: 'bessel'
        bessel_basis_num: 8
    cutoff_function:
        cutoff_function_name: 'XPLOR'
        cutoff_on: 4.5
    self_connection_type: 'linear'

    train_shift_scale: False
    train_denominator: False

train:
    random_seed: 1
    is_train_stress: True
    epoch: 100

    optimizer: 'adam'
    optim_param:
        lr: 0.004
    scheduler: 'exponentiallr'
    scheduler_param:
        gamma: 0.99

    force_loss_weight: 0.1
    stress_loss_weight: 1e-06

    per_epoch: 10

    # Include EWCLoss in error_record to track it
    error_record:
        - ['Energy', 'RMSE']
        - ['Force', 'RMSE']
        - ['Stress', 'RMSE']
        - ['TotalLoss', 'None']
        - ['EWCLoss', 'None']

    continue:
        reset_optimizer: True
        reset_scheduler: True
        reset_epoch: True
        checkpoint: 'SevenNet-0_11July2024'
        use_statistic_values_of_checkpoint: True
        calc_fisher: False
        loss_threshold: -1
        # Paths to Fisher and optimal params generated by compute_fisher
        opt_params: './opt_params_sevenn.pt'
        fisher_information: './fisher_sevenn.pt'
        ewc_lambda: 1e12  # EWC loss weight, will be divided by 2

data:
    batch_size: 4
    data_divide_ratio: 0.1

    data_format: 'ase'
    data_format_args:
        index: ':'

    load_dataset_path: ['fine_tune.extxyz']
